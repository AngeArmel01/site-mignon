<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pour toi ❤️</title>
<style>
  body {
    margin: 0; padding: 0; text-align: center;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ffe6f0, #fff);
    overflow: hidden;
  }
  .container { margin-top: 20vh; padding: 20px; }
  h1 { font-size: 2em; color: #444; animation: pop 0.5s ease; }
  @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  p { font-size: 1.2em; color: #666; }
  button {
    padding: 15px 25px; font-size: 18px;
    border-radius: 15px; border: none;
    cursor: pointer; margin: 15px; transition: transform 0.3s;
  }
  button:hover { transform: scale(1.1); }
  #yes {
    background: #ff4d6d; color: white;
    box-shadow: 0 0 20px rgba(255,0,100,0.5);
  }
  #no {
    position: fixed; background: #ccc; color: #333;
    transition: left 0.15s ease, top 0.15s ease;
  }
  .heart {
    position: fixed; top: -10px; font-size: 18px;
    pointer-events: none; animation: fall linear infinite;
  }
  @keyframes fall { to { transform: translateY(100vh); } }

  /* ── Bouton musique discret ── */
  #music-note {
    position: fixed; bottom: 12px; right: 14px;
    font-size: 20px; cursor: pointer;
    opacity: 0.5; transition: opacity 0.3s;
    user-select: none; z-index: 999;
  }
  #music-note:hover { opacity: 1; }

  .confirm-btn {
    background: #ff4d6d; color: white;
    box-shadow: 0 0 20px rgba(255,0,100,0.5);
    animation: pop 0.4s ease;
  }
  .progress-bar {
    margin: 20px auto; width: 220px;
    height: 8px; background: #ffc0cb;
    border-radius: 10px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: #ff4d6d;
    border-radius: 10px; transition: width 0.4s ease;
  }
  .step-hint { font-size: 0.85em; color: #bbb; margin-top: 4px; }

  /* ════════════════════════════════
     ÉCRAN DE DÉMARRAGE
  ════════════════════════════════ */
  #splash {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #ffe6f0, #fff5f8);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    cursor: pointer;
    transition: opacity 0.8s ease;
  }
  #splash.hidden {
    opacity: 0;
    pointer-events: none;
  }

  /* Cercle pulsant autour de l'icône */
  .splash-ring {
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(255, 77, 109, 0.12);
    display: flex; align-items: center; justify-content: center;
    animation: pulse-ring 1.8s ease-in-out infinite;
    margin-bottom: 28px;
  }
  @keyframes pulse-ring {
    0%   { transform: scale(1);    box-shadow: 0 0 0 0 rgba(255,77,109,0.35); }
    50%  { transform: scale(1.06); box-shadow: 0 0 0 18px rgba(255,77,109,0); }
    100% { transform: scale(1);    box-shadow: 0 0 0 0 rgba(255,77,109,0); }
  }

  .splash-icon { font-size: 52px; }

  .splash-title {
    font-size: 1.5em;
    color: #ff4d6d;
    font-weight: 700;
    margin: 0 0 8px;
    letter-spacing: 0.5px;
  }
  .splash-sub {
    font-size: 1em;
    color: #aaa;
    margin: 0 0 32px;
  }

  /* Bouton "Lancer" */
  .splash-btn {
    background: #ff4d6d;
    color: white;
    border: none;
    border-radius: 50px;
    padding: 16px 40px;
    font-size: 1.1em;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(255,77,109,0.45);
    transition: transform 0.2s, box-shadow 0.2s;
    animation: pop 0.6s ease 0.3s both;
    letter-spacing: 0.5px;
  }
  .splash-btn:hover {
    transform: scale(1.06);
    box-shadow: 0 10px 30px rgba(255,77,109,0.55);
  }

  /* Petits cœurs décoratifs en fond du splash */
  .splash-deco {
    position: absolute;
    font-size: 22px;
    opacity: 0.18;
    animation: float 4s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0);  }
    50%       { transform: translateY(-12px); }
  }
</style>
</head>
<body>

<!-- ✅ 1. CHANGE LE PRÉNOM ICI  -->
<!-- ✅ 2. CHANGE LE NOM DU MP3  -->
<script>
  const prenom     = "DAMO";
  const fichierMp3 = "musique.mp3";
</script>

<!-- ══ ÉCRAN DE DÉMARRAGE ══ -->
<div id="splash" onclick="lancerExperience()">
  <!-- Cœurs déco -->
  <span class="splash-deco" style="top:10%; left:8%;  animation-delay:0s;">💗</span>
  <span class="splash-deco" style="top:15%; right:10%; animation-delay:0.8s;">💕</span>
  <span class="splash-deco" style="bottom:18%; left:12%; animation-delay:1.4s;">💓</span>
  <span class="splash-deco" style="bottom:12%; right:8%; animation-delay:0.4s;">💖</span>

  <div class="splash-ring">
    <span class="splash-icon">🎵</span>
  </div>
  <p class="splash-title">Un message pour toi…</p>
  <p class="splash-sub">Active le son avant de continuer 🎧</p>
  <button class="splash-btn">▶ &nbsp;Clique ici pour commencer</button>
</div>

<!-- ══ CONTENU PRINCIPAL ══ -->
<div class="container" id="main" style="opacity:0; transition: opacity 0.8s ease;">
  <h1 id="titre">Hey … 😊</h1>
  <p>J'ai une petite question pour toi…</p>
  <p>Si je te faisais sourire là maintenant…<br>tu me le rendrais ? ❤️</p>
  <button id="yes" onclick="yesClicked()">Bien sûr 😊</button>
  <button id="no">Je réfléchis…</button>
</div>

<span id="music-note" title="Musique">🔊</span>

<audio id="music" loop preload="auto">
  <source id="music-src" src="" type="audio/mpeg">
</audio>

<script>
/* ── Prénom ── */
document.getElementById("titre").textContent = "Hey " + prenom + "… 😊";

/* ── Audio ── */
const music = document.getElementById("music");
const note  = document.getElementById("music-note");
document.getElementById("music-src").src = fichierMp3;
music.load();

/* ── Lancement depuis le splash ── */
function lancerExperience() {
  music.play()
    .then(() => {
      note.textContent = "🔊";
      // Cache le splash
      const splash = document.getElementById("splash");
      splash.classList.add("hidden");
      setTimeout(() => splash.remove(), 900);
      // Affiche le contenu
      const main = document.getElementById("main");
      main.style.opacity = "1";
      // Centre le bouton non
      setTimeout(centerNoBtn, 100);
    })
    .catch(() => {
      // Si le navigateur refuse quand même (très rare ici)
      // On laisse le splash visible avec un message
      document.querySelector(".splash-sub").textContent = "Appuie une fois sur le bouton ⬆️";
    });
}

/* ── Bouton mute/unmute ── */
note.addEventListener("click", (e) => {
  e.stopPropagation();
  if (music.paused) { music.play(); note.textContent = "🔊"; }
  else              { music.pause(); note.textContent = "🔇"; }
});

/* ── Bouton "Je réfléchis" ── */
const noBtn = document.getElementById("no");

function centerNoBtn() {
  noBtn.style.left = Math.round(window.innerWidth / 2 - noBtn.offsetWidth / 2) + "px";
  noBtn.style.top  = Math.round(window.innerHeight / 2 + 60) + "px";
}
window.addEventListener("resize", centerNoBtn);

document.addEventListener("mousemove", function(e) {
  const rect = noBtn.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top  + rect.height / 2;
  if (Math.abs(e.clientX - cx) < 130 && Math.abs(e.clientY - cy) < 70) {
    const margin = 20;
    noBtn.style.left = Math.floor(Math.random() * (window.innerWidth  - noBtn.offsetWidth  - margin) + margin) + "px";
    noBtn.style.top  = Math.floor(Math.random() * (window.innerHeight - noBtn.offsetHeight - margin) + margin) + "px";
  }
});

noBtn.addEventListener("touchstart", function(e) {
  e.preventDefault();
  const margin = 20;
  noBtn.style.left = Math.floor(Math.random() * (window.innerWidth  - noBtn.offsetWidth  - margin) + margin) + "px";
  noBtn.style.top  = Math.floor(Math.random() * (window.innerHeight - noBtn.offsetHeight - margin) + margin) + "px";
}, { passive: false });

/* ── Séquence de confirmation ── */
let confirmStep = 0;
const totalSteps = 5;

function sureTimes(n) { return Array(n).fill("sûre").join(" "); }

const stepEmojis   = ["🤔", "👀", "😏", "😭", "🥹"];
const stepSubtexts = [
  "Réfléchis bien…",
  "T'es vraiment sûre ?",
  "Hmmm… vraiment vraiment ?",
  "Ok ok… je te crois presque 😅",
  "Dernière chance de changer d'avis 👀"
];

function yesClicked() {
  if (noBtn && noBtn.parentNode) noBtn.remove();
  confirmStep++;

  if (confirmStep <= totalSteps) {
    const question = "Tu en es " + sureTimes(confirmStep) + " ?";
    const emoji    = stepEmojis[confirmStep - 1];
    const subtext  = stepSubtexts[confirmStep - 1];
    const progress = Math.round((confirmStep / totalSteps) * 100);

    document.getElementById("main").innerHTML = `
      <h1 style="font-size:1.6em;">${emoji} ${question}</h1>
      <p style="color:#aaa; font-style:italic;">${subtext}</p>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${progress}%;"></div>
      </div>
      <p class="step-hint">${confirmStep} / ${totalSteps}</p>
      <button class="confirm-btn" onclick="yesClicked()"
        style="padding:15px 25px;font-size:18px;border-radius:15px;
               border:none;cursor:pointer;margin:15px;">
        Oui, certaine ! 💖
      </button>
    `;
  } else {
    showFinalScreen();
  }
}

function showFinalScreen() {
  document.getElementById("main").innerHTML = `
    <h1>Je le savais 😌❤️</h1>
    <p>Franchement… tu viens de me faire sourire aussi 😏</p>
    <p>On devrait vraiment tester ça en vrai 👀</p>
    <button onclick="openWhatsApp()"
      style="margin-top:30px;padding:15px 25px;font-size:18px;border-radius:15px;
             border:none;cursor:pointer;background:#25D366;color:white;
             box-shadow:0 0 15px rgba(0,0,0,.2);">
      Viens me parler 💬
    </button>
  `;
  startHearts();
}

function openWhatsApp() {
  window.open("https://wa.me/22503881311", "_blank");
}

function startHearts() {
  setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.textContent = ["💓","💖","💗","💕"][Math.floor(Math.random()*4)];
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 2 + 3) + "s";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5500);
  }, 150);
}
</script>

</body>
</html>
