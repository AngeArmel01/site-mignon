<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pour toi ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  text-align: center;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ffe6f0, #fff);
  overflow: hidden;
  animation: fadeIn 1.5s ease-in;
}

@keyframes fadeIn { from {opacity:0;} to {opacity:1;} }

.container { margin-top: 20vh; padding: 20px; }

h1 { font-size: 2em; color: #444; animation: pop 1s ease; }
@keyframes pop { 0% {transform: scale(0.8);} 100% {transform: scale(1);} }

p { font-size: 1.2em; color: #666; }

button {
  padding: 15px 25px;
  font-size: 18px;
  border-radius: 15px;
  border: none;
  cursor: pointer;
  margin: 15px;
  transition: 0.3s;
}
button:hover { transform: scale(1.1); }

#yes {
  background: #ff4d6d;
  color: white;
  box-shadow: 0 0 20px rgba(255,0,100,0.5);
}

#no {
  position: fixed;
  background: #ccc;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* Cœurs */
.heart {
  position: fixed;
  top: -10px;
  font-size: 18px;
  animation: fall linear infinite;
}
@keyframes fall { to {transform: translateY(100vh);} }

/* Bouton WhatsApp */
.whatsapp {
  margin-top: 30px;
  background: #25D366;
  color: white;
  box-shadow: 0 0 15px rgba(0,0,0,0.2);
}

/* Lecteur audio caché mais autoplay */
audio { display: none; }
</style>
</head>

<body>

<div class="container">
  <h1>Hey Damo… 😊</h1>
  <p>J’ai une petite question pour toi…</p>
  <p>Si je te faisais sourire là maintenant…<br>tu me le rendrais ? ❤️</p>

  <button id="yes" onclick="yesClicked()">Bien sûr 😊</button>
  <button id="no">Je réfléchis…</button>
</div>

<!-- Musique directe -->
<audio id="music" autoplay loop>
  <source src="Apple Music
https://music.apple.com · 6 janv. 2025
I Love You, I'm Sorry par Gracie Abrams sur Apple Music" type="audio/mpeg">
  Ton navigateur ne supporte pas l’audio.
</audio>

<script>
// Bouton "non" qui fuit 😈
const noBtn = document.getElementById("no");
document.addEventListener("mousemove", function(e) {
  const rect = noBtn.getBoundingClientRect();
  if (Math.abs(e.clientX - rect.left) < 100 && Math.abs(e.clientY - rect.top) < 100) {
    noBtn.style.left = Math.random() * window.innerWidth + "px";
    noBtn.style.top = Math.random() * window.innerHeight + "px";
  }
});

// Quand on clique "oui" 💖
function yesClicked() {
  document.body.innerHTML = `
    <div class="container">
      <h1>Je le savais 😌❤️</h1>
      <p>Franchement… tu viens de me faire sourire aussi 😏</p>
      <p>On devrait vraiment tester ça en vrai 👀</p>

      <button class="whatsapp" onclick="openWhatsApp()">
        Viens me parler 💬
      </button>
    </div>
  `;
  startHearts();
}

function openWhatsApp() {
  window.open("https://wa.me/22503881311", "_blank");
}

// Pluie de cœurs 💓
function startHearts() {
  setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💓";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 2 + 3) + "s";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
  }, 150);
}
</script>

</body>
</html>
